<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Prospects — BHT CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">BHT Revenue OS</div>
      <nav>
        <a href="/ceo-daily.html">CEO Daily</a>
        <a href="/">Dashboard</a>
        <a href="/leads.html">Leads</a>
        <a href="/opportunities.html">Opportunities</a>
        <a href="/contacts.html">Contacts</a>
        <a href="/tasks.html">Tasks</a>
        <a href="/b2b-prospects.html" class="active">B2B Prospects</a>
        <a href="/reactivation-dashboard.html">客户激活仪表盘</a>
        <a href="/reply-inbox.html">Reply Inbox</a>
        <a href="/reactivation-queue.html">SMS Campaign</a>
        <a href="/data-maintenance.html">Data Maintenance</a>
        <a href="/growth-console.html">Growth Ops</a>
        <a href="/admin-console.html">Admin Console</a>
      </nav>
    </aside>
    <main class="main" style="background:#f8fafc;">
      <header class="header">Internal CRM</header>
      <div id="b2b-root" class="content" style="padding:0; overflow:auto;"></div>
    </main>
  </div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    const STATUS_OPTIONS = [
      { value: 'not_contacted', label: 'Not Contacted', cls: 'bg-slate-100 text-slate-600' },
      { value: 'email_sent',    label: 'Email Sent',    cls: 'bg-blue-100 text-blue-700' },
      { value: 'called',        label: 'Called',        cls: 'bg-amber-100 text-amber-700' },
      { value: 'meeting_booked',label: 'Meeting Booked',cls: 'bg-purple-100 text-purple-700' },
      { value: 'converted',     label: 'Converted ✓',  cls: 'bg-emerald-100 text-emerald-700' },
      { value: 'not_interested',label: 'Not Interested',cls: 'bg-rose-100 text-rose-700' },
    ];

    const statusStyle = (v) => STATUS_OPTIONS.find(s => s.value === v) || STATUS_OPTIONS[0];

    function B2BProspects() {
      const [prospects, setProspects]   = useState([]);
      const [stats, setStats]           = useState([]);
      const [total, setTotal]           = useState(0);
      const [loading, setLoading]       = useState(true);
      const [selected, setSelected]     = useState(null);
      const [filter, setFilter]         = useState({ status: '', q: '' });
      const [showAdd, setShowAdd]       = useState(false);
      const [showImport, setShowImport] = useState(false);
      const [showBulkSMS, setShowBulkSMS] = useState(false);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [smsText, setSmsText]       = useState('');
      const [sending, setSending]       = useState(false);
      const [actionMsg, setActionMsg]   = useState(null);

      const load = (f = filter) => {
        setLoading(true);
        const p = new URLSearchParams();
        if (f.status) p.set('status', f.status);
        if (f.q)      p.set('q', f.q);
        p.set('limit', '200');
        fetch('/api/b2b-prospects?' + p)
          .then(r => r.json())
          .then(j => { setProspects(j.prospects || []); setTotal(j.total || 0); setStats(j.stats || []); })
          .catch(() => {})
          .finally(() => setLoading(false));
      };

      useEffect(() => { load(); }, []);

      const statCount = (v) => {
        const s = stats.find(x => x.outreach_status === v);
        return s ? parseInt(s.cnt) : 0;
      };

      const toggleSelect = (id) => {
        setSelectedIds(prev => {
          const n = new Set(prev);
          n.has(id) ? n.delete(id) : n.add(id);
          return n;
        });
      };
      const toggleAll = () => {
        if (selectedIds.size === prospects.length) setSelectedIds(new Set());
        else setSelectedIds(new Set(prospects.map(p => p.id)));
      };

      const updateStatus = async (id, status) => {
        await fetch('/api/b2b-prospects/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ outreach_status: status }),
        });
        setProspects(prev => prev.map(p => p.id === id ? { ...p, outreach_status: status } : p));
        if (selected?.id === id) setSelected(s => ({ ...s, outreach_status: status }));
      };

      const sendSingleSMS = async (id, msg) => {
        if (!msg.trim()) return;
        setSending(true);
        try {
          const r = await fetch('/api/b2b-prospects/' + id + '/sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg }),
          });
          const j = await r.json();
          if (!j.ok) throw new Error(j.error);
          setActionMsg({ ok: true, text: '短信已发送 ✓' });
          load();
        } catch (e) {
          setActionMsg({ ok: false, text: e.message || '发送失败' });
        } finally {
          setSending(false);
        }
      };

      const sendBulkSMS = async () => {
        if (!smsText.trim() || !selectedIds.size) return;
        setSending(true);
        try {
          const r = await fetch('/api/b2b-prospects/bulk-sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids: [...selectedIds], message: smsText }),
          });
          const j = await r.json();
          setActionMsg({ ok: true, text: `已发送 ${j.sent} 条，失败 ${j.failed} 条` });
          setShowBulkSMS(false);
          setSmsText('');
          setSelectedIds(new Set());
          load();
        } catch (e) {
          setActionMsg({ ok: false, text: e.message });
        } finally {
          setSending(false);
        }
      };

      return (
        <div className="min-h-full bg-slate-50 text-slate-900">
          <div className="mx-auto max-w-7xl p-6">

            {/* Header */}
            <div className="mb-6 flex items-center justify-between">
              <div>
                <h1 className="text-3xl font-semibold tracking-tight">B2B Prospects</h1>
                <p className="mt-1 text-sm text-slate-500">租房中介及合作伙伴外拓管理 · 共 {total} 条</p>
              </div>
              <div className="flex gap-2">
                {selectedIds.size > 0 && (
                  <button onClick={() => setShowBulkSMS(true)}
                    className="rounded-xl bg-slate-800 px-4 py-2 text-sm font-medium text-white">
                    群发 SMS ({selectedIds.size})
                  </button>
                )}
                <button onClick={() => setShowImport(true)}
                  className="rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200">
                  批量导入
                </button>
                <button onClick={() => setShowAdd(true)}
                  className="rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">
                  + 新增
                </button>
              </div>
            </div>

            {/* Stats row */}
            <div className="mb-6 flex gap-3 flex-wrap">
              {STATUS_OPTIONS.map(s => (
                <button key={s.value}
                  onClick={() => { const f = { ...filter, status: filter.status === s.value ? '' : s.value }; setFilter(f); load(f); }}
                  className={`rounded-full px-3 py-1 text-xs font-medium border transition-all ${filter.status === s.value ? 'ring-2 ring-offset-1 ring-slate-400' : ''} ${s.cls}`}>
                  {s.label} · {statCount(s.value)}
                </button>
              ))}
            </div>

            {/* Action message */}
            {actionMsg && (
              <div className={`mb-4 rounded-xl px-4 py-3 text-sm ${actionMsg.ok ? 'bg-emerald-50 text-emerald-800 border border-emerald-200' : 'bg-rose-50 text-rose-800 border border-rose-200'}`}>
                {actionMsg.text}
                <button onClick={() => setActionMsg(null)} className="ml-3 opacity-60 hover:opacity-100">✕</button>
              </div>
            )}

            {/* Search */}
            <div className="mb-4 flex gap-3">
              <input
                type="text"
                placeholder="搜索公司名、联系人、邮箱、电话…"
                value={filter.q}
                onChange={e => setFilter(f => ({ ...f, q: e.target.value }))}
                onKeyDown={e => e.key === 'Enter' && load()}
                className="flex-1 rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"
              />
              <button onClick={() => load()} className="rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200">搜索</button>
              <button onClick={() => { setFilter({ status: '', q: '' }); load({ status: '', q: '' }); }}
                className="rounded-xl bg-white px-4 py-2 text-sm text-slate-500 ring-1 ring-slate-200">清除</button>
            </div>

            {/* Main grid */}
            <div className="grid grid-cols-1 gap-6 xl:grid-cols-12">

              {/* List */}
              <div className="rounded-3xl bg-white shadow-sm ring-1 ring-slate-200 xl:col-span-7 overflow-hidden">
                <div className="border-b border-slate-100 p-4 flex items-center justify-between">
                  <h2 className="font-semibold">潜客列表</h2>
                  <label className="flex items-center gap-2 text-xs text-slate-500 cursor-pointer">
                    <input type="checkbox" checked={selectedIds.size === prospects.length && prospects.length > 0}
                      onChange={toggleAll} className="rounded" />
                    全选
                  </label>
                </div>
                <div className="overflow-y-auto" style={{maxHeight:'calc(100vh - 280px)'}}>
                  {loading ? (
                    <div className="p-8 text-center text-slate-400">Loading...</div>
                  ) : prospects.length === 0 ? (
                    <div className="p-8 text-center text-slate-400">
                      <div className="text-4xl mb-3">🏢</div>
                      <div className="font-medium mb-1">还没有 B2B 潜客</div>
                      <div className="text-sm">点击右上角"新增"或"批量导入"开始建库</div>
                    </div>
                  ) : prospects.map(p => {
                    const st = statusStyle(p.outreach_status);
                    return (
                      <div key={p.id}
                        onClick={() => setSelected(p)}
                        className={`flex items-start gap-3 p-4 border-b border-slate-50 cursor-pointer hover:bg-slate-50 ${selected?.id === p.id ? 'bg-blue-50' : ''}`}>
                        <input type="checkbox" checked={selectedIds.has(p.id)}
                          onClick={e => e.stopPropagation()}
                          onChange={() => toggleSelect(p.id)}
                          className="mt-1 rounded flex-shrink-0" />
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="font-medium text-sm">{p.company_name}</span>
                            <span className={`inline-flex rounded-full px-2 py-0.5 text-xs font-medium ${st.cls}`}>{st.label}</span>
                          </div>
                          <div className="text-xs text-slate-500 mt-0.5">
                            {p.contact_name && <span>{p.contact_name} · </span>}
                            {p.phone && <span>{p.phone}</span>}
                            {p.suburb && <span> · {p.suburb}</span>}
                            {p.portfolio_size && <span> · {p.portfolio_size} 套</span>}
                          </div>
                        </div>
                        <div className="text-xs text-slate-400 flex-shrink-0">
                          {p.last_contacted_at ? new Date(p.last_contacted_at).toLocaleDateString() : '未联系'}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Detail panel */}
              <div className="rounded-3xl bg-white shadow-sm ring-1 ring-slate-200 xl:col-span-5">
                <div className="border-b border-slate-100 p-4">
                  <h2 className="font-semibold">详情 / 操作</h2>
                </div>
                <div className="p-5">
                  {!selected ? (
                    <div className="py-12 text-center text-slate-400">点击左侧记录查看详情</div>
                  ) : (
                    <ProspectDetail
                      prospect={selected}
                      onStatusChange={updateStatus}
                      onSendSMS={sendSingleSMS}
                      sending={sending}
                      onRefresh={() => { load(); }}
                    />
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Add modal */}
          {showAdd && <AddModal onClose={() => setShowAdd(false)} onSaved={() => { setShowAdd(false); load(); }} />}

          {/* Import modal */}
          {showImport && <ImportModal onClose={() => setShowImport(false)} onSaved={(r) => { setShowImport(false); setActionMsg({ ok: true, text: `导入完成：${r.inserted} 条成功，${r.skipped} 条跳过` }); load(); }} />}

          {/* Bulk SMS modal */}
          {showBulkSMS && (
            <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl shadow-xl w-full max-w-lg p-6">
                <h3 className="text-lg font-semibold mb-1">群发 SMS</h3>
                <p className="text-sm text-slate-500 mb-4">已选 {selectedIds.size} 个潜客（仅有手机号的会收到）</p>
                <textarea
                  value={smsText}
                  onChange={e => setSmsText(e.target.value)}
                  rows={5}
                  placeholder="输入短信内容…"
                  className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300 resize-none"
                />
                <div className="text-xs text-slate-400 mt-1 mb-4">{smsText.length} 字符</div>
                <div className="flex gap-3 justify-end">
                  <button onClick={() => setShowBulkSMS(false)} className="rounded-xl bg-slate-100 px-4 py-2 text-sm">取消</button>
                  <button onClick={sendBulkSMS} disabled={sending || !smsText.trim()}
                    className="rounded-xl bg-slate-900 px-4 py-2 text-sm text-white disabled:opacity-40">
                    {sending ? '发送中…' : '发送'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ProspectDetail({ prospect: p, onStatusChange, onSendSMS, sending, onRefresh }) {
      const [replyText, setReplyText] = useState('');
      const [notes, setNotes] = useState(p.notes || '');
      const [savingNotes, setSavingNotes] = useState(false);

      const saveNotes = async () => {
        setSavingNotes(true);
        await fetch('/api/b2b-prospects/' + p.id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notes }),
        });
        setSavingNotes(false);
        onRefresh();
      };

      return (
        <div className="space-y-4 text-sm">
          <div>
            <div className="text-xs text-slate-400 mb-1">公司</div>
            <div className="font-semibold text-base">{p.company_name}</div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div><div className="text-xs text-slate-400">联系人</div><div>{p.contact_name || '—'}</div></div>
            <div><div className="text-xs text-slate-400">电话</div><div>{p.phone || '—'}</div></div>
            <div><div className="text-xs text-slate-400">邮箱</div><div className="truncate">{p.email || '—'}</div></div>
            <div><div className="text-xs text-slate-400">区域</div><div>{p.suburb || '—'}</div></div>
            <div><div className="text-xs text-slate-400">管理套数</div><div>{p.portfolio_size ? p.portfolio_size + ' 套' : '—'}</div></div>
            <div><div className="text-xs text-slate-400">来源</div><div>{p.source || '—'}</div></div>
          </div>

          {/* Status change */}
          <div>
            <div className="text-xs text-slate-400 mb-2">跟进状态</div>
            <div className="flex flex-wrap gap-2">
              {['not_contacted','email_sent','called','meeting_booked','converted','not_interested'].map(s => {
                const st = STATUS_OPTIONS.find(x => x.value === s);
                return (
                  <button key={s}
                    onClick={() => onStatusChange(p.id, s)}
                    className={`rounded-full px-3 py-1 text-xs font-medium border-2 ${p.outreach_status === s ? 'border-slate-800 ' + st.cls : 'border-transparent ' + st.cls + ' opacity-60 hover:opacity-100'}`}>
                    {st.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Notes */}
          <div>
            <div className="text-xs text-slate-400 mb-1">备注</div>
            <textarea
              value={notes}
              onChange={e => setNotes(e.target.value)}
              rows={3}
              className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none resize-none"
            />
            <button onClick={saveNotes} disabled={savingNotes}
              className="mt-1 text-xs text-slate-500 hover:text-slate-800">
              {savingNotes ? '保存中…' : '保存备注'}
            </button>
          </div>

          {/* SMS */}
          {p.phone && (
            <div>
              <div className="text-xs text-slate-400 mb-1">发送 SMS</div>
              <div className="flex gap-2">
                <textarea
                  value={replyText}
                  onChange={e => setReplyText(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSendSMS(p.id, replyText); setReplyText(''); } }}
                  rows={2}
                  placeholder="输入短信内容… Enter 发送"
                  className="flex-1 resize-none rounded-xl border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300"
                />
                <button
                  onClick={() => { onSendSMS(p.id, replyText); setReplyText(''); }}
                  disabled={sending || !replyText.trim()}
                  className="self-end rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white disabled:opacity-40">
                  发送
                </button>
              </div>
            </div>
          )}

          {p.next_followup_at && (
            <div className="rounded-xl bg-amber-50 border border-amber-200 px-3 py-2 text-xs text-amber-700">
              跟进提醒：{new Date(p.next_followup_at).toLocaleDateString()}
            </div>
          )}
        </div>
      );
    }

    function AddModal({ onClose, onSaved }) {
      const [form, setForm] = useState({
        company_name: '', contact_name: '', phone: '', email: '',
        suburb: '', portfolio_size: '', notes: '', source: 'manual',
      });
      const [saving, setSaving] = useState(false);
      const [err, setErr] = useState(null);

      const save = async () => {
        if (!form.company_name.trim()) { setErr('公司名称必填'); return; }
        setSaving(true);
        try {
          const r = await fetch('/api/b2b-prospects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form),
          });
          const j = await r.json();
          if (!j.ok) throw new Error(j.error);
          onSaved();
        } catch (e) {
          setErr(e.message);
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
            <h3 className="text-lg font-semibold mb-4">新增 B2B 潜客</h3>
            {err && <div className="mb-3 text-sm text-rose-600 bg-rose-50 rounded-xl px-3 py-2">{err}</div>}
            <div className="space-y-3">
              {[
                ['company_name','公司名称 *','text'],
                ['contact_name','联系人姓名','text'],
                ['phone','电话','tel'],
                ['email','邮箱','email'],
                ['suburb','区域','text'],
              ].map(([k, label, type]) => (
                <div key={k}>
                  <label className="block text-xs text-slate-500 mb-1">{label}</label>
                  <input type={type} value={form[k]} onChange={e => setForm(f => ({...f, [k]: e.target.value}))}
                    className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300" />
                </div>
              ))}
              <div>
                <label className="block text-xs text-slate-500 mb-1">管理套数</label>
                <select value={form.portfolio_size} onChange={e => setForm(f => ({...f, portfolio_size: e.target.value}))}
                  className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none">
                  <option value="">选择…</option>
                  <option value="1-5">1–5 套</option>
                  <option value="6-20">6–20 套</option>
                  <option value="21-50">21–50 套</option>
                  <option value="50+">50+ 套</option>
                </select>
              </div>
              <div>
                <label className="block text-xs text-slate-500 mb-1">备注</label>
                <textarea value={form.notes} onChange={e => setForm(f => ({...f, notes: e.target.value}))}
                  rows={2} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none resize-none" />
              </div>
            </div>
            <div className="flex gap-3 justify-end mt-5">
              <button onClick={onClose} className="rounded-xl bg-slate-100 px-4 py-2 text-sm">取消</button>
              <button onClick={save} disabled={saving}
                className="rounded-xl bg-slate-900 px-4 py-2 text-sm text-white disabled:opacity-40">
                {saving ? '保存中…' : '保存'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function ImportModal({ onClose, onSaved }) {
      const [text, setText] = useState('');
      const [saving, setSaving] = useState(false);
      const [err, setErr] = useState(null);

      const doImport = async () => {
        setSaving(true);
        setErr(null);
        try {
          const lines = text.trim().split('\n').filter(Boolean);
          const rows = lines.map(line => {
            const [company_name, contact_name, phone, email, suburb, portfolio_size] = line.split('\t').map(s => s?.trim());
            return { company_name, contact_name, phone, email, suburb, portfolio_size };
          });
          const r = await fetch('/api/b2b-prospects/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(rows),
          });
          const j = await r.json();
          if (!j.ok) throw new Error(j.error);
          onSaved(j);
        } catch (e) {
          setErr(e.message);
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-lg p-6">
            <h3 className="text-lg font-semibold mb-1">批量导入</h3>
            <p className="text-xs text-slate-500 mb-3">
              从 Excel 复制粘贴（Tab 分隔）：<br/>
              <span className="font-mono bg-slate-100 px-1 rounded">公司名 | 联系人 | 电话 | 邮箱 | 区域 | 套数</span>
            </p>
            {err && <div className="mb-3 text-sm text-rose-600 bg-rose-50 rounded-xl px-3 py-2">{err}</div>}
            <textarea
              value={text}
              onChange={e => setText(e.target.value)}
              rows={8}
              placeholder={'Ray White Norwood\t Sarah Jones\t 0412345678\t sarah@rw.com.au\t Norwood\t 21-50\nLJ Hooker Glenelg\t Tom Smith\t 0498765432\t tom@ljh.com.au\t Glenelg\t 6-20'}
              className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-slate-300 resize-none"
            />
            <div className="flex gap-3 justify-end mt-4">
              <button onClick={onClose} className="rounded-xl bg-slate-100 px-4 py-2 text-sm">取消</button>
              <button onClick={doImport} disabled={saving || !text.trim()}
                className="rounded-xl bg-slate-900 px-4 py-2 text-sm text-white disabled:opacity-40">
                {saving ? '导入中…' : '开始导入'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('b2b-root'));
    root.render(<B2BProspects />);
  </script>
</body>
</html>
