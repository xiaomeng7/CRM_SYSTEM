<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads — BHT CRM</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">BHT Revenue OS</div>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/leads.html">Leads</a>
        <a href="/opportunities.html">Opportunities</a>
        <a href="/contacts.html">Contacts</a>
        <a href="/tasks.html">Tasks</a>
      </nav>
    </aside>
    <main class="main">
      <header class="header">Internal CRM</header>
      <div class="content">
        <h1 class="page-title">Leads</h1>
        <div class="search"><input type="search" placeholder="Search leads…" /></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Suburb</th>
                <th>Source</th>
                <th>Service type</th>
                <th>Status</th>
                <th>Created</th>
                <th>Recent activity</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>—</td>
                <td>—</td>
                <td>—</td>
                <td>—</td>
                <td>—</td>
                <td><span class="badge">new</span></td>
                <td class="muted">—</td>
                <td class="muted">—</td>
                <td class="actions">
                  <button type="button" class="btn btn-sm">Status</button>
                  <a href="/lead-detail.html" class="btn btn-sm">Details</a>
                  <button type="button" class="btn btn-sm btn-primary">Convert</button>
                  <button type="button" class="btn btn-sm">Task</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <p class="muted" style="margin-top:1rem;">Data from API — placeholder row. Actions: update status, view details, convert to opportunity, create task.</p>
      </div>
    </main>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
