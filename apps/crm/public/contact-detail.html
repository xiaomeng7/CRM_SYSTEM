<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Detail — BHT CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">BHT Revenue OS</div>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/leads.html">Leads</a>
        <a href="/opportunities.html">Opportunities</a>
        <a href="/contacts.html">Contacts</a>
        <a href="/tasks.html">Tasks</a>
        <a href="/reactivation-dashboard.html">客户激活仪表盘</a>
        <a href="/reply-inbox.html">Reply Inbox</a>
        <a href="/reactivation-queue.html">SMS Campaign</a>
        <a href="/data-maintenance.html">Data Maintenance</a>
        <a href="/growth-console.html">Growth Ops</a>
      </nav>
    </aside>
    <main class="main" style="background:#f8fafc;">
      <header class="header">Internal CRM</header>
      <div id="contact-detail-root" class="content" style="padding:1rem;"></div>
    </main>
  </div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;
    const id = new URLSearchParams(window.location.search).get('id');

    function formatTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const t = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (t.getTime() === today.getTime()) return `Today ${timeStr}`;
      return d.toLocaleDateString() + ' ' + timeStr;
    }

    function ContactDetail() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [editing, setEditing] = useState(false);
      const [saving, setSaving] = useState(false);
      const [editForm, setEditForm] = useState({ name: '', phone: '', email: '' });
      const [smsThread, setSmsThread] = useState([]);
      const [loadingThread, setLoadingThread] = useState(false);
      const [replyText, setReplyText] = useState('');
      const [sendingReply, setSendingReply] = useState(false);
      const [replyStatus, setReplyStatus] = useState(null);

      const load = () => {
        if (!id) return;
        setLoading(true);
        fetch('/api/contacts/' + id + '/detail')
          .then((r) => r.ok ? r.json() : Promise.reject(new Error('Not found')))
          .then(setData)
          .catch((e) => setError(e.message))
          .finally(() => setLoading(false));
      };

      useEffect(() => {
        if (!id) { setError('Missing id'); setLoading(false); return; }
        load();
        loadThread();
      }, [id]);

      const loadThread = () => {
        if (!id) return;
        setLoadingThread(true);
        fetch('/api/contacts/' + id + '/sms-thread')
          .then((r) => r.ok ? r.json() : { messages: [] })
          .then((j) => setSmsThread(j.messages || []))
          .catch(() => setSmsThread([]))
          .finally(() => setLoadingThread(false));
      };

      const handleSendReply = async () => {
        const msg = replyText.trim();
        if (!msg) return;
        setSendingReply(true);
        setReplyStatus(null);
        try {
          const res = await fetch('/api/contacts/' + id + '/send-sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || 'Failed');
          setReplyText('');
          setReplyStatus({ ok: true, text: '发送成功 ✓' });
          loadThread();
        } catch (e) {
          setReplyStatus({ ok: false, text: e.message || '发送失败' });
        } finally {
          setSendingReply(false);
        }
      };

      const startEdit = () => {
        const c = (data && data.contact) || {};
        setEditForm({ name: c.name || '', phone: c.phone || '', email: c.email || '' });
        setEditing(true);
      };

      const saveEdit = () => {
        setSaving(true);
        fetch('/api/contacts/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(editForm),
        })
          .then((r) => r.ok ? r.json() : Promise.reject(new Error(r.statusText)))
          .then(() => { setEditing(false); load(); })
          .catch((e) => alert('保存失败: ' + (e.message || e)))
          .finally(() => setSaving(false));
      };

      if (loading) return <div className="p-8 text-slate-500">Loading...</div>;
      if (error) return <div className="p-8 text-rose-600">{error} <a href="/contacts.html" className="underline">返回 Contacts</a></div>;
      if (!data) return null;

      const c = data.contact || {};
      return (
        <div className="max-w-4xl space-y-6">
          <div className="flex items-center justify-between">
            <h1 className="text-2xl font-semibold">{c.name || '—'}</h1>
            <div className="flex items-center gap-2">
              {!editing ? (
                <button type="button" onClick={startEdit} className="rounded-lg bg-slate-100 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-200">补全信息</button>
              ) : null}
              <a href="/contacts.html" className="text-sm text-slate-600 hover:underline">← 返回 Contacts</a>
            </div>
          </div>
          <div className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
            <h2 className="text-lg font-medium mb-4">Contact</h2>
            {editing ? (
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">姓名</label>
                  <input type="text" value={editForm.name} onChange={(e) => setEditForm((f) => ({ ...f, name: e.target.value }))} className="w-full max-w-md rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="姓名" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">电话</label>
                  <input type="text" value={editForm.phone} onChange={(e) => setEditForm((f) => ({ ...f, phone: e.target.value }))} className="w-full max-w-md rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="电话" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1">邮箱</label>
                  <input type="email" value={editForm.email} onChange={(e) => setEditForm((f) => ({ ...f, email: e.target.value }))} className="w-full max-w-md rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="邮箱" />
                </div>
                <div className="flex gap-2">
                  <button type="button" onClick={saveEdit} disabled={saving} className="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50">保存</button>
                  <button type="button" onClick={() => setEditing(false)} className="rounded-lg bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200">取消</button>
                </div>
              </div>
            ) : (
              <dl className="grid grid-cols-2 gap-3 text-sm">
                <dt className="text-slate-500">Phone</dt><dd>{c.phone || '—'}</dd>
                <dt className="text-slate-500">Email</dt><dd>{c.email || '—'}</dd>
                <dt className="text-slate-500">Account</dt><dd><a href={'/account-detail.html?id=' + (c.linked_account_id || '')} className="text-blue-600 hover:underline">{c.linked_account_name || '—'}</a></dd>
                <dt className="text-slate-500">Suburb</dt><dd>{c.suburb || '—'}</dd>
                {c.do_not_contact && <><dt className="text-slate-500">Do Not Contact</dt><dd className="text-rose-600">是</dd></>}
              </dl>
            )}
          </div>
          <div className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
            <h2 className="text-lg font-medium mb-4">Recent Activities</h2>
            {data.activities?.length ? (
              <ul className="space-y-2 text-sm">
                {data.activities.map((a) => (
                  <li key={a.id} className="flex justify-between"><span>{a.activity_type}</span><span>{a.occurred_at ? new Date(a.occurred_at).toLocaleString() : '—'}</span><span className="truncate max-w-xs">{a.summary || '—'}</span></li>
                ))}
              </ul>
            ) : <p className="text-slate-500">暂无</p>}
          </div>

          <div className="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 overflow-hidden">
            <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
              <h2 className="text-lg font-medium">SMS 对话</h2>
              <button onClick={loadThread} className="text-xs text-slate-500 hover:text-slate-700">刷新</button>
            </div>
            <div className="flex flex-col" style={{height:'360px'}}>
              <div className="flex-1 overflow-y-auto p-4 space-y-2 bg-slate-50">
                {loadingThread ? (
                  <div className="text-sm text-slate-400 text-center pt-12">Loading...</div>
                ) : smsThread.length === 0 ? (
                  <div className="text-sm text-slate-400 text-center pt-12">暂无短信记录</div>
                ) : smsThread.map((m) => {
                  const isOut = m.activity_type === 'outbound_sms';
                  return (
                    <div key={m.id} className={`flex ${isOut ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-xs lg:max-w-sm rounded-2xl px-4 py-2.5 text-sm shadow-sm ${isOut ? 'bg-slate-800 text-white rounded-br-sm' : 'bg-white text-slate-800 border border-slate-200 rounded-bl-sm'}`}>
                        <div style={{whiteSpace:'pre-wrap'}}>{m.summary}</div>
                        <div className="mt-1 text-xs opacity-60">{formatTime(m.occurred_at)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {c.do_not_contact ? (
                <div className="border-t border-slate-200 p-4 bg-rose-50 text-sm text-rose-700">该联系人已标记为 Do Not Contact，无法发送短信。</div>
              ) : !c.phone ? (
                <div className="border-t border-slate-200 p-4 bg-slate-100 text-sm text-slate-500">该联系人没有手机号，无法发送短信。</div>
              ) : (
                <div className="border-t border-slate-200 bg-white p-3">
                  <div className="flex gap-2">
                    <textarea
                      value={replyText}
                      onChange={(e) => setReplyText(e.target.value)}
                      onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendReply(); } }}
                      placeholder={`发短信给 ${c.name || c.phone}… (Enter 发送, Shift+Enter 换行)`}
                      rows={2}
                      className="flex-1 resize-none rounded-xl border border-slate-200 px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400"
                    />
                    <button
                      onClick={handleSendReply}
                      disabled={sendingReply || !replyText.trim()}
                      className="self-end rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white disabled:opacity-40"
                    >
                      {sendingReply ? '发送中…' : '发送'}
                    </button>
                  </div>
                  {replyStatus && (
                    <div className={`mt-2 text-xs ${replyStatus.ok ? 'text-emerald-600' : 'text-rose-600'}`}>{replyStatus.text}</div>
                  )}
                </div>
              )}
            </div>
          </div>
          <div className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
            <h2 className="text-lg font-medium mb-4">Tasks (open/pending)</h2>
            {data.tasks?.length ? (
              <ul className="space-y-2 text-sm">
                {data.tasks.map((t) => (
                  <li key={t.id} className="flex justify-between"><span>{t.title}</span><span>{t.due_at ? new Date(t.due_at).toLocaleDateString() : '—'}</span></li>
                ))}
              </ul>
            ) : <p className="text-slate-500">暂无</p>}
          </div>
          <div className="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
            <h2 className="text-lg font-medium mb-4">Leads</h2>
            {data.leads?.length ? (
              <ul className="space-y-2 text-sm">
                {data.leads.map((l) => (
                  <li key={l.id}><a href={'/lead-detail.html?id=' + l.id} className="text-blue-600 hover:underline">{l.status}</a> {l.source} {l.created_at ? new Date(l.created_at).toLocaleDateString() : ''}</li>
                ))}
              </ul>
            ) : <p className="text-slate-500">暂无</p>}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('contact-detail-root'));
    root.render(<ContactDetail />);
  </script>
</body>
</html>
