<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts — BHT CRM</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">BHT Revenue OS</div>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/leads.html">Leads</a>
        <a href="/opportunities.html">Opportunities</a>
        <a href="/contacts.html">Contacts</a>
        <a href="/tasks.html">Tasks</a>
      </nav>
    </aside>
    <main class="main">
      <header class="header">Internal CRM</header>
      <div class="content" data-page="contacts">
        <h1 class="page-title">Contacts</h1>
        <div class="search">
          <input type="search" id="contacts-search" placeholder="Search contacts…" />
        </div>
        <p id="contacts-state" class="muted" style="margin:0 0 0.5rem 0;"></p>
        <label style="display:block; margin-bottom:0.5rem; font-size:0.85rem;">
          <input type="checkbox" id="contacts-filter-dormant" />
          Show only customers with last job &gt; 6 months ago
        </label>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Suburb</th>
                <th>Job count</th>
                <th>Last job</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="contacts-tbody">
              <tr>
                <td colspan="7" class="muted">Loading contacts…</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p class="muted" style="margin-top:1rem;">Searchable list of imported ServiceM8 customers. Actions: view details, send reactivation SMS.</p>
      </div>
    </main>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
