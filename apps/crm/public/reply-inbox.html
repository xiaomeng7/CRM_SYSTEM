<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客户回复中心 — BHT CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">BHT Revenue OS</div>
      <nav>
        <a href="/ceo-daily.html">CEO Daily</a>
        <a href="/">Dashboard</a>
        <a href="/leads.html">Leads</a>
        <a href="/opportunities.html">Opportunities</a>
        <a href="/contacts.html">Contacts</a>
        <a href="/tasks.html">Tasks</a>
        <a href="/b2b-prospects.html">B2B Prospects</a>
        <a href="/inspection-review.html">Inspection Review</a>
        <a href="/reactivation-dashboard.html">客户激活仪表盘</a>
        <a href="/reply-inbox.html" class="active">Reply Inbox</a>
        <a href="/reactivation-queue.html">SMS Campaign</a>
        <a href="/data-maintenance.html">Data Maintenance</a>
        <a href="/growth-console.html">Growth Ops</a>
        <a href="/admin-console.html">Admin Console</a>
      </nav>
    </aside>
    <main class="main" style="background:#f8fafc;">
      <header class="header">Internal CRM</header>
      <div id="reply-inbox-root" class="content" style="padding:0; overflow:auto;"></div>
    </main>
  </div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    function formatTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      const t = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (t.getTime() === today.getTime()) return `Today ${timeStr}`;
      if (t.getTime() === yesterday.getTime()) return `Yesterday ${timeStr}`;
      return d.toLocaleDateString() + ' ' + timeStr;
    }

    function ReplyInbox() {
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [data, setData] = useState(null);
      const [selected, setSelected] = useState(null);
      const [recentActivities, setRecentActivities] = useState([]);
      const [loadingActivities, setLoadingActivities] = useState(false);
      const [actionBusy, setActionBusy] = useState(false);
      const [replyText, setReplyText] = useState('');
      const [sendingReply, setSendingReply] = useState(false);
      const [replyStatus, setReplyStatus] = useState(null);
      const [smsThread, setSmsThread] = useState([]);
      const [loadingThread, setLoadingThread] = useState(false);
      const [createLeadSuccess, setCreateLeadSuccess] = useState(false);
      const [createLeadError, setCreateLeadError] = useState(null);

      const fetchData = () => {
        setLoading(true);
        fetch('/api/reactivation/replies')
          .then((res) => {
            if (!res.ok) throw new Error(res.statusText || 'Fetch failed');
            return res.json();
          })
          .then(setData)
          .catch((err) => setError(err.message))
          .finally(() => setLoading(false));
      };

      useEffect(() => { fetchData(); }, []);

      useEffect(() => {
        if (!selected?.contact_id) {
          setRecentActivities([]);
          return;
        }
        setLoadingActivities(true);
        fetch('/api/contacts/' + selected.contact_id + '/activities?limit=5')
          .then((res) => res.ok ? res.json() : [])
          .then(setRecentActivities)
          .catch(() => setRecentActivities([]))
          .finally(() => setLoadingActivities(false));
      }, [selected?.contact_id]);

      const loadThread = (contactId) => {
        if (!contactId) return;
        setLoadingThread(true);
        fetch('/api/contacts/' + contactId + '/sms-thread')
          .then((res) => res.ok ? res.json() : { messages: [] })
          .then((j) => setSmsThread(j.messages || []))
          .catch(() => setSmsThread([]))
          .finally(() => setLoadingThread(false));
      };

      useEffect(() => {
        if (!selected?.contact_id) { setSmsThread([]); return; }
        loadThread(selected.contact_id);
        setReplyText('');
        setReplyStatus(null);
      }, [selected?.contact_id]);

      const handleSendReply = async () => {
        const msg = replyText.trim();
        if (!msg || !selected?.contact_id) return;
        setSendingReply(true);
        setReplyStatus(null);
        try {
          const res = await fetch('/api/contacts/' + selected.contact_id + '/send-sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || 'Failed to send');
          setReplyText('');
          setReplyStatus({ ok: true, text: '发送成功 ✓' });
          loadThread(selected.contact_id);
        } catch (e) {
          setReplyStatus({ ok: false, text: e.message || '发送失败' });
        } finally {
          setSendingReply(false);
        }
      };

      const handleCreateTask = async () => {
        if (!selected?.contact_id) {
          alert('该回复无关联联系人，无法创建任务');
          return;
        }
        setActionBusy(true);
        try {
          const res = await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contact_id: selected.contact_id,
              account_id: selected.account_id,
              title: 'Follow up SMS reply',
              source: 'reply_inbox',
            }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || '创建失败');
          alert('已创建跟进任务');
          fetchData();
          setSelected((s) => s ? { ...s, has_open_task: true } : null);
        } catch (e) {
          alert(e.message || '创建失败');
        } finally {
          setActionBusy(false);
        }
      };

      const handleMarkHandled = async () => {
        if (!selected?.id) return;
        setActionBusy(true);
        try {
          const res = await fetch('/api/reactivation/replies/' + selected.id + '/handled', {
            method: 'PATCH',
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || '操作失败');
          alert('已标记为已处理');
          fetchData();
          setSelected((s) => s ? { ...s, handled: true } : null);
        } catch (e) {
          alert(e.message || '操作失败');
        } finally {
          setActionBusy(false);
        }
      };

      const handlePlaceholder = () => alert('Coming soon');

      const handleDoNotContact = () => {
        if (!selected?.contact_id) {
          alert('该回复无关联联系人');
          return;
        }
        const reason = prompt('原因（可选）：');
        if (reason === null) return;
        setActionBusy(true);
        setCreateLeadError(null);
        fetch('/api/contacts/' + selected.contact_id + '/do-not-contact', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value: true, reason: (reason || '').trim() || 'Customer requested' }),
        })
          .then((r) => r.json())
          .then((json) => {
            if (json.ok) {
              setCreateLeadSuccess(true);
              setCreateLeadError(null);
              fetchData();
              setSelected((s) => s ? { ...s, do_not_contact: true } : null);
            } else {
              setCreateLeadError(json.error || '操作失败');
            }
          })
          .catch((e) => setCreateLeadError(e.message || '操作失败'))
          .finally(() => setActionBusy(false));
      };

      const handleCreateLead = async () => {
        if (!selected?.contact_id) {
          alert('该回复无关联联系人，无法创建 Lead');
          return;
        }
        setActionBusy(true);
        setCreateLeadSuccess(false);
        setCreateLeadError(null);
        try {
          const res = await fetch('/api/leads', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contact_id: selected.contact_id,
              account_id: selected.account_id,
              source: 'reply_inbox',
              created_by: 'reply-inbox',
            }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || '创建失败');
          setCreateLeadSuccess(true);
          fetchData();
          setSelected((s) => s ? { ...s, lead_created: true } : null);
        } catch (e) {
          setCreateLeadError(e.message);
        } finally {
          setActionBusy(false);
        }
      };

      const stats = data?.stats ?? { todayReplies: 0, unhandled: 0, needsAttention: 0, tasksCreatedToday: 0 };
      const replies = data?.replies ?? [];

      const statusOf = (r) => {
        if (r.has_open_task) return { label: 'Follow Up', cls: 'bg-amber-100 text-amber-700' };
        if (r.handled) return { label: 'Handled', cls: 'bg-emerald-100 text-emerald-700' };
        return { label: 'New', cls: 'bg-blue-100 text-blue-700' };
      };

      const INTENT_STYLE = {
        interested: { label: 'Interested', cls: 'bg-emerald-100 text-emerald-700' },
        call_request: { label: 'Call Request', cls: 'bg-blue-100 text-blue-700' },
        not_now: { label: 'Not Now', cls: 'bg-slate-100 text-slate-600' },
        unsubscribe: { label: 'Unsubscribe', cls: 'bg-rose-100 text-rose-700' },
        wrong_number: { label: 'Wrong Number', cls: 'bg-rose-100 text-rose-700' },
        unclear: { label: 'Unclear', cls: 'bg-amber-100 text-amber-700' },
      };
      const SUGGESTED_ACTION = {
        interested: 'Create Lead',
        call_request: 'Create Follow-up Task',
        not_now: 'Mark Handled',
        unsubscribe: 'Do Not Contact',
        wrong_number: 'Do Not Contact',
        unclear: 'Review Manually',
      };

      if (loading) {
        return (
          <div className="min-h-full bg-slate-50 text-slate-900 flex items-center justify-center p-8">
            <div className="text-slate-500">Loading...</div>
          </div>
        );
      }
      if (error) {
        return (
          <div className="min-h-full bg-slate-50 text-slate-900 flex items-center justify-center p-8">
            <div className="rounded-2xl bg-rose-50 border border-rose-200 p-6 text-rose-800">
              <div className="font-medium">加载失败</div>
              <div className="mt-2 text-sm">{error}</div>
              <button onClick={() => { setError(null); fetchData(); }} className="mt-4 rounded-xl bg-rose-600 px-4 py-2 text-sm text-white">重试</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-full bg-slate-50 text-slate-900">
          <div className="mx-auto max-w-7xl p-6 md:p-8">
            <div className="mb-6 flex items-center justify-between">
              <div>
                <h1 className="text-3xl font-semibold tracking-tight">Reply Inbox</h1>
                <p className="mt-2 text-sm text-slate-600">集中查看和处理客户短信回复（Twilio inbound SMS）</p>
              </div>
              <a href="/reactivation-dashboard.html" className="rounded-2xl bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm ring-1 ring-slate-200">返回仪表盘</a>
            </div>

            <div className="mb-6 grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
              {[
                ['Today Replies', stats.todayReplies],
                ['Unhandled', stats.unhandled],
                ['Needs Attention', stats.needsAttention],
                ['Tasks Created Today', stats.tasksCreatedToday],
              ].map(([label, value]) => (
                <div key={label} className="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
                  <div className="text-sm text-slate-500">{label}</div>
                  <div className="mt-3 text-3xl font-semibold">{value}</div>
                </div>
              ))}
            </div>

            <div className="grid grid-cols-1 gap-6 xl:grid-cols-12">
              <div className="rounded-3xl bg-white shadow-sm ring-1 ring-slate-200 xl:col-span-5">
                <div className="border-b border-slate-100 p-4">
                  <h2 className="text-lg font-semibold">回复列表</h2>
                </div>
                <div className="max-h-[480px] overflow-y-auto">
                  {replies.length === 0 ? (
                    <div className="p-8 text-center text-slate-500">暂无客户回复。inbound_sms 来自 Twilio webhook。</div>
                  ) : (
                    <table className="min-w-full text-left text-sm">
                      <thead className="sticky top-0 bg-white text-slate-500">
                        <tr className="border-b border-slate-100">
                          <th className="p-3 font-medium">Contact</th>
                          <th className="p-3 font-medium">Time</th>
                          <th className="p-3 font-medium">Preview</th>
                          <th className="p-3 font-medium">Intent</th>
                          <th className="p-3 font-medium">Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {replies.map((r) => {
                          const st = statusOf(r);
                          return (
                            <tr
                              key={r.id}
                              onClick={() => setSelected(r)}
                              className={`cursor-pointer border-b border-slate-50 hover:bg-slate-50 ${selected?.id === r.id ? 'bg-blue-50' : ''}`}
                            >
                              <td className="p-3">
                                <div className="font-medium">{r.contact_name}</div>
                                <div className="text-xs text-slate-500">{r.phone} · {r.account_name}</div>
                              </td>
                              <td className="p-3 text-slate-600">{formatTime(r.occurred_at)}</td>
                              <td className="p-3 text-slate-600 max-w-[120px] truncate">{r.message || '—'}</td>
                              <td className="p-3">
                                {r.intent ? (
                                  <div className="space-y-0.5">
                                    <span className={`inline-flex rounded-full px-2 py-0.5 text-xs font-medium ${(INTENT_STYLE[r.intent] || INTENT_STYLE.unclear).cls}`}>
                                      {(INTENT_STYLE[r.intent] || INTENT_STYLE.unclear).label}
                                    </span>
                                    {r.intent_confidence != null && (
                                      <div className="text-xs text-slate-500">{Math.round(r.intent_confidence * 100)}%</div>
                                    )}
                                    {r.intent_source && <div className="text-xs text-slate-400">{r.intent_source}</div>}
                                  </div>
                                ) : (
                                  <span className="text-xs text-slate-400">—</span>
                                )}
                              </td>
                              <td className="p-3">
                                <span className={`inline-flex rounded-full px-2.5 py-1 text-xs font-medium ${st.cls}`}>{st.label}</span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>

              <div className="rounded-3xl bg-white shadow-sm ring-1 ring-slate-200 xl:col-span-7">
                <div className="border-b border-slate-100 p-4">
                  <h2 className="text-lg font-semibold">回复详情</h2>
                </div>
                <div className="p-6">
                  {!selected ? (
                    <div className="py-12 text-center text-slate-500">点击左侧回复查看详情</div>
                  ) : (
                    <>
                      <div className="space-y-4">
                        <div>
                          <div className="text-sm text-slate-500">Contact</div>
                          <div className="font-medium">{selected.contact_name}</div>
                        </div>
                        <div>
                          <div className="text-sm text-slate-500">Phone</div>
                          <div>{selected.phone}</div>
                        </div>
                        <div>
                          <div className="text-sm text-slate-500">Account</div>
                          <div>{selected.account_name}</div>
                        </div>
                        <div>
                          <div className="text-sm text-slate-500">Reply time</div>
                          <div>{formatTime(selected.occurred_at)}</div>
                        </div>
                        <div>
                          <div className="text-sm text-slate-500">Full message</div>
                          <div className="mt-2 rounded-2xl bg-slate-50 p-4 text-slate-700">{selected.message || '—'}</div>
                        </div>
                        {selected.intent && (
                          <div>
                            <div className="text-sm text-slate-500">Intent</div>
                            <div className="mt-1 flex items-center gap-2">
                              <span className={`inline-flex rounded-full px-2.5 py-1 text-xs font-medium ${(INTENT_STYLE[selected.intent] || INTENT_STYLE.unclear).cls}`}>
                                {(INTENT_STYLE[selected.intent] || INTENT_STYLE.unclear).label}
                              </span>
                              {selected.intent_confidence != null && (
                                <span className="text-xs text-slate-500">{Math.round(selected.intent_confidence * 100)}%</span>
                              )}
                              {selected.intent_source && (
                                <span className="text-xs text-slate-400">({selected.intent_source})</span>
                              )}
                            </div>
                            <div className="mt-2 text-sm text-slate-600">
                              Suggested: <span className="font-medium">{SUGGESTED_ACTION[selected.intent] || 'Review Manually'}</span>
                            </div>
                          </div>
                        )}
                      </div>

                      <div className="mt-8">
                        <div className="text-sm font-medium text-slate-600 mb-3">Actions</div>
                        {(createLeadSuccess || createLeadError) && (
                      <div className={`mb-4 rounded-xl border px-4 py-3 text-sm ${createLeadError ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'}`}>
                        {createLeadError ? createLeadError : 'Lead 创建成功'}
                      </div>
                    )}
                    <div className="flex flex-wrap gap-3">
                          <button
                            onClick={handleCreateTask}
                            disabled={!selected.contact_id || actionBusy}
                            className="rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white disabled:opacity-50"
                          >
                            创建跟进任务
                          </button>
                          <button
                            onClick={handleCreateLead}
                            disabled={!selected.contact_id || actionBusy || selected.lead_created}
                            className="rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200 disabled:opacity-50 disabled:cursor-not-allowed"
                          >
                            {selected.lead_created ? 'Lead 已创建' : '创建 Lead'}
                          </button>
                          <button
                            onClick={handleMarkHandled}
                            disabled={actionBusy}
                            className="rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200"
                          >
                            标记已处理
                          </button>
                          <a href={selected.contact_id ? '/contact-detail.html?id=' + selected.contact_id : '#'} className="rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200">打开客户档案</a>
                          <button
                            onClick={handleDoNotContact}
                            disabled={!selected.contact_id || actionBusy || selected.do_not_contact}
                            className="rounded-xl bg-white px-4 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-200 disabled:opacity-50"
                          >
                            {selected.do_not_contact ? '已标记勿联系' : 'Do Not Contact'}
                          </button>
                        </div>
                      </div>

                      {selected.contact_id && (
                        <div className="mt-8">
                          <div className="text-sm font-medium text-slate-600 mb-3">SMS 对话记录</div>
                          <div className="rounded-2xl bg-slate-50 border border-slate-200 flex flex-col" style={{minHeight:'220px', maxHeight:'320px'}}>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2">
                              {loadingThread ? (
                                <div className="text-sm text-slate-400 text-center pt-8">Loading...</div>
                              ) : smsThread.length === 0 ? (
                                <div className="text-sm text-slate-400 text-center pt-8">暂无短信记录</div>
                              ) : smsThread.map((m) => {
                                const isOut = m.activity_type === 'outbound_sms';
                                return (
                                  <div key={m.id} className={`flex ${isOut ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] rounded-2xl px-3 py-2 text-sm shadow-sm ${isOut ? 'bg-slate-800 text-white rounded-br-sm' : 'bg-white text-slate-800 border border-slate-200 rounded-bl-sm'}`}>
                                      <div style={{whiteSpace:'pre-wrap'}}>{m.summary}</div>
                                      <div className={`mt-1 text-xs ${isOut ? 'text-slate-400' : 'text-slate-400'}`}>{formatTime(m.occurred_at)}</div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                            <div className="border-t border-slate-200 p-3 flex gap-2">
                              <textarea
                                value={replyText}
                                onChange={(e) => setReplyText(e.target.value)}
                                onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendReply(); } }}
                                placeholder="回复客户… (Enter 发送, Shift+Enter 换行)"
                                rows={2}
                                className="flex-1 resize-none rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400"
                              />
                              <button
                                onClick={handleSendReply}
                                disabled={sendingReply || !replyText.trim()}
                                className="self-end rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white disabled:opacity-40"
                              >
                                {sendingReply ? '发送中…' : '发送'}
                              </button>
                            </div>
                            {replyStatus && (
                              <div className={`px-3 pb-3 text-xs ${replyStatus.ok ? 'text-emerald-600' : 'text-rose-600'}`}>{replyStatus.text}</div>
                            )}
                          </div>
                        </div>
                      )}
                    </>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('reply-inbox-root'));
    root.render(<ReplyInbox />);
  </script>
</body>
</html>
